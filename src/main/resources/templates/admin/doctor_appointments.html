<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Create User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">
    <style>
        body {
           font-family: 'Poppins', sans-serif;
       }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
    <div class="container-fluid">
        <h2 class="navbar-brand">Clinic Management System</h2>
        <h2 class="navbar-brand" th:text="'Appointments for Dr. ' + ${doctor.fullName}"></h2>
        <ul class="d-flex list-unstyled" role="search">
            <li class="me-4"><a class="text-white text-decoration-none" th:href="@{/admin/dashboard}">Back to dashboard</a></li>
            <li class="me-4"><a class="text-white text-decoration-none" th:href="@{/admin/doctors}">Doctors</a></li>
            <li class=""><a class="text-white text-decoration-none" th:href="@{/logout}">Logout</a></li>
        </ul>
    </div>
</nav>
<br>
<br>
<div class="container">
    <p th:if="${#lists.isEmpty(appointments)}" style="color:gray;">
        No appointments created yet.
    </p>
    <table class="table">
        <thead>
        <tr>
            <th scope="col">Doctor</th>
            <th scope="col">Specialization</th>
            <th scope="col">Appointment Date</th>
            <th scope="col">Status</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="appointment : ${appointments}">
            <td th:text="${doctor.fullName}"></td>
            <td th:text="${doctor.specialization}"></td>
            <td th:text="${#temporals.format(appointment.appointmentDate, 'MMM dd, yyyy hh:mm a')}"></td>
            <td>
                <span class="badge rounded-pill" th:text="${appointment.status}"
                      th:classappend="${appointment.status == 'APPROVED'} ? 'bg-success' :(${appointment.status == 'REJECTED'} ? 'bg-danger' : 'bg-primary')">
                </span>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
