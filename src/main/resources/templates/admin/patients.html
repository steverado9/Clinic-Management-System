<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <title>Patients</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
  <style>
    body {
       font-family: 'Poppins', sans-serif;
   }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
  <div class="container-fluid">
    <h2 class="navbar-brand">Clinic Management System</h2>
    <h2 class="navbar-brand">List Of Patients</h2>
    <ul class="d-flex list-unstyled" role="search">
      <li class="me-4"><a class="text-white text-decoration-none" th:href="@{/admin/dashboard}">Back to dashboard</a></li>
      <li class=""><a class="text-white text-decoration-none" th:href="@{/logout}">Logout</a></li>
    </ul>
  </div>
</nav>
<br>
<br>
<div class="container">
  <p th:if="${#lists.isEmpty(patients)}" style="color:gray;">
    No patients created yet.
  </p>
  <table class="table">
    <thead>
      <tr>
        <th scope="col">Full Name</th>
        <th scope="col">Email</th>
        <th scope="col">Phone Number</th>
        <th scope="col">View Medical Report</th>
        <th scope="col">Action</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="patient : ${patients}">
        <td th:text="${patient.fullName}"></td>
        <td th:text="${patient.email}"></td>
        <td th:text="${patient.phoneNumber}"></td>
        <td>
          <a th:href="@{/admin/patients/{id}/reports(id=${patient.id})}"
             class="btn btn-sm btn-primary">
            Medical Report
          </a>
        </td>
        <td>
          <form th:action="@{/admin/patients/delete/{id}(id=${patient.id})}" method="POST" class="delete-form">
            <input type="hidden" name="_method" value="delete"/>
            <button type="submit" class="btn btn-danger btn-sm">
              Delete
            </button>
          </form>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
  document.querySelectorAll(".delete-form").forEach(form => {
      form.addEventListener("submit", function(event) {
          event.preventDefault();

          Swal.fire({
              title: "Are you sure?",
              text: "This action cannot be undone!",
              icon: "warning",
              showCancelButton: true,
              confirmButtonColor: "#d33",
              cancelButtonColor: "#3085d6",
              confirmButtonText: "Yes, delete it!"
          }).then((result) => {
              if (result.isConfirmed) {
                  form.submit();
              }
          });
      });
  });
</script>

</body>
</html>
