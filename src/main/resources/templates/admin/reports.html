<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <title>Patient reports</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
  <style>
    body {
       font-family: 'Poppins', sans-serif;
   }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
  <div class="container-fluid">
    <h2 class="navbar-brand">Clinic Management System</h2>
    <h2 class="navbar-brand" th:text="'Medical Report for ' + ${patient.get().fullName}"></h2>
    <ul class="d-flex list-unstyled" role="search">
      <li class="me-4"><a class="text-white text-decoration-none" th:href="@{/admin/dashboard}">Back to dashboard</a></li>
      <li class="me-4"><a class="text-white text-decoration-none" th:href="@{/admin/patients}">Patients</a></li>
      <li class=""><a class="text-white text-decoration-none" th:href="@{/logout}">Logout</a></li>
    </ul>
  </div>
</nav>
<br>
<br>
<div class="container">
  <p th:if="${#lists.isEmpty(reports)}" style="color:gray;">
    No medical report created yet.
  </p>
  <div th:if="${error}" class="alert alert-danger mt-3 text-center">
    <span th:text="${error}"></span>
  </div>
  <table class="table">
    <thead>
    <tr>
      <th scope="col">Patient</th>
      <th scope="col">Clinic Name</th>
      <th scope="col">Doctor</th>
      <th scope="col">Diagnosis</th>
      <th scope="col">Treatment Notes</th>
    </tr>
    </thead>
    <tbody>
      <tr th:each="report : ${reports}">
        <td th:text="${patient.fullName}"></td>
        <td th:text="${report.clinicName}"></td>
        <td th:text="${report.doctor.fullName}"></td>
        <td th:text="${report.diagnosis}"></td>
        <td th:text="${report.treatmentNotes}"></td>
      </tr>
    </tbody>
  </table>
</div>
</body>
</html>
