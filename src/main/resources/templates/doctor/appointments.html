<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Doctor's Appointment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
    <div class="container-fluid">
        <h3 class="navbar-brand">Clinic Management System</h3>
        <h3 class="navbar-brand">Doctor's Appointments</h3>
        <ul class="d-flex list-unstyled" role="search">
            <li class="me-4"><a class="text-white text-decoration-none" th:href="@{/doctor/dashboard}">Back to dashboard</a></li>
            <li class=""><a class="text-white text-decoration-none" th:href="@{/logout}">Logout</a></li>
        </ul>
    </div>
</nav>
<br>
<br>
<div class="container">
<table class="table">
    <thead>
        <tr>
            <th scope="col">Patient Email</th>
            <th scope="col">Appointment Date</th>
            <th scope="col">Status</th>
            <th scope="col">Action</th>
            <th scope="col">Report</th>
            <th scope="col">Edit Report</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each ="appointment : ${appointments}">
            <td th:text="${appointment.patient.fullName}"></td>
            <td th:text="${#temporals.format(appointment.appointmentDate, 'MMM dd, yyyy hh:mm a')}"></td>
            <td th:text="${appointment.status}"></td>
            <td>
                <div class="d-flex">
                    <form class="me-4" th:action="@{/doctor/appointments/{id}/approve(id=${appointment.id})}" method="post">
                        <button type="submit" class="btn btn-primary">Approve</button>
                    </form>

                    <form th:action="@{/doctor/appointments/{id}/reject(id=${appointment.id})}" method="post">
                        <button type="submit" class="btn btn-danger">Reject</button>
                    </form>
                </div>
            </td>
            <td>
                <a th:if="${appointment.status.name() == 'APPROVED' && appointment.medicalReport == null}"
                        th:href="@{/doctor/report/create/{id}(id=${appointment.id})}" type="button" class="btn btn-primary">
                    Create Report
                </a>
            </td>
            <td>
                <a th:if="${appointment.medicalReport != null}"
                   th:href="@{/doctor/report/edit/{id}(id=${appointment.medicalReport.id})}" type="button" class="btn btn-primary">
                    Edit Report
                </a>
            </td>
        </tr>
    </tbody>
</table>
    <div th:if="${param.success}">
        <p style="color:green;">Response Sent</p>
    </div>

    <div th:if="${param.error}">
        <p style="color:red;">Error sending response!</p>
    </div>
</div>


</body>
</html>
