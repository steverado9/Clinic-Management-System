<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Appointments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">
    <style>
        body {
           font-family: 'Poppins', sans-serif;
       }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
    <div class="container-fluid">
        <h2 class="navbar-brand">Clinic Management System</h2>
        <h2 class="navbar-brand">List Of Appointments</h2>
        <ul class="d-flex list-unstyled" role="search">
            <li class="me-4"><a class="text-white text-decoration-none" th:href="@{/reception/dashboard}">Back to dashboard</a></li>
            <li class=""><a class="text-white text-decoration-none" th:href="@{/logout}">Logout</a></li>
        </ul>
    </div>
</nav>
<br>
<br>
<div class="container">
    <p th:if="${#lists.isEmpty(appointments)}" style="color:gray;">
        No Appointments created yet.
    </p>
    <table class="table">
        <thead>
        <tr>
            <th scope="col">Patient Name</th>
            <th scope="col">Doctor Name</th>
            <th scope="col">Appointment Date</th>
            <th scope="col">Appointment Status</th>
            <th scope="col">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="app : ${appointments}">
            <td th:text="${app.patient.fullName}"></td>
            <td th:text="${app.doctor.fullName}"></td>
            <td th:text="${#temporals.format(app.appointmentDate, 'MMM dd, yyyy hh:mm a')}"></td>
            <td th:text="${app.status}"></td>
            <td>
                <div class="d-flex">
                    <!--approve-->
                    <form th:if="${app.status.name() == 'PENDING'}" class="me-4" th:action="@{/reception/appointments/{id}/approve(id=${app.id})}" method="post">
                        <button type="submit" class="btn btn-primary">Approve</button>
                    </form>

                    <!--Reject-->
                    <form th:if="${app.status.name() == 'PENDING'}" class="me-4" th:action="@{/reception/appointments/{id}/reject(id=${app.id})}" method="post">
                        <button type="submit" class="btn btn-danger">Reject</button>
                    </form>

                    <!--Delete-->
                    <form th:action="@{/reception/appointments/delete/{id}(id=${app.id})}" method="POST" class="delete-form">
                        <input type="hidden" name="_method" value="delete"/>
                        <button type="submit" class="btn btn-danger">Delete</button>
                    </form>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    document.querySelectorAll(".delete-form").forEach(form => {
        form.addEventListener("submit", function(event) {
            event.preventDefault();

            Swal.fire({
                title: "Are you sure?",
                text: "This action cannot be undone!",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#d33",
                cancelButtonColor: "#3085d6",
                confirmButtonText: "Yes, delete it!"
            }).then((result) => {
                if (result.isConfirmed) {
                    form.submit();
                }
            });
        });
    });
</script>

</body>
</html>
