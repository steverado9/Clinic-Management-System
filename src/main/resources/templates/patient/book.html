<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Book an appointment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
    <div class="container-fluid">
        <h2 class="navbar-brand">Clinic Management System</h2>
        <h2 class="navbar-brand">Book An Appointment</h2>
        <ul class="d-flex list-unstyled" role="search">
            <li class="me-4"><a class="text-white text-decoration-none" th:href="@{/patient/dashboard}">Dashboard</a></li>
            <li class=""><a class="text-white text-decoration-none" th:href="@{/logout}">Logout</a></li>
        </ul>
    </div>
</nav>
<br>
<br>
<div class="container d-flex justify-content-center" style="min-height: 100vh;">
    <div class="col-lg-5 col-md-7">
        <div class="card shadow-lg border-0 rounded-4">

            <div class="card-body p-4">
                <h3 class="text-center mb-4 fw-bold">Book Appointment</h3>

                <form th:action="@{/patient/book}" th:object="${appointment}" method="post">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Select Doctor</label>
                        <select class="form-select" th:field="*{doctorId}" required>
                            <option value="" disabled selected>Choose Doctor</option>
                            <option th:each="doc : ${doctors}"
                                    th:value="${doc.id}"
                                    th:text="${doc.fullName + ' - ' + doc.specialization}">
                            </option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Select Date</label>
                        <input type="date"
                               class="form-control"
                               th:min="${#dates.format(#dates.createNow(), 'yyyy-MM-dd')}"
                               name="date"
                               required/>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Select Time</label>
                        <select class="form-select" name="time" required>
                            <option value="" disabled selected>Select Time</option>
                            <option value="09:00">09:00 AM</option>
                            <option value="09:30">09:30 AM</option>
                            <option value="10:00">10:00 AM</option>
                            <option value="10:30">10:30 AM</option>
                            <option value="11:00">11:00 AM</option>
                            <option value="11:30">11:30 AM</option>
                            <option value="12:00">12:00 PM</option>
                        </select>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg rounded-3">
                            Book Appointment
                        </button>
                    </div>
                </form>

                <div th:if="${error}" class="alert alert-danger mt-3 text-center">
                    <span th:text="${error}"></span>
                </div>

            </div>
        </div>
    </div>
</div>
</body>
</html>
