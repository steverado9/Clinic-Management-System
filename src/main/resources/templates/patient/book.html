<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Book an appointment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
    <div class="container-fluid">
        <h2 class="navbar-brand">Clinic Management System</h2>
        <h2 class="navbar-brand">Book An Appointment</h2>
        <ul class="d-flex list-unstyled" role="search">
            <li class=""><a class="text-white text-decoration-none" th:href="@{/logout}">Logout</a></li>
        </ul>
    </div>
</nav>
<br>
<br>
<div class="container">
    <div class="col-lg-6 col-sm-6 container justify-content-center card mt-5">
        <h2 class="text-center">Book Appointment</h2>
        <div class="card-body">
            <form th:action="@{/patient/book}" th:object="${appointment}" method="post">

                <label>Select Doctor</label>
                <select th:field="*{doctor.id}" required>
                    <option value="" disabled>Choose Doctor</option>
                    <option th:each="doc : ${doctors}"
                            th:value="${doc.id}"
                            th:text="${doc.fullName + ' - ' + doc.specialization}">
                    </option>
                </select><br>

                <label>Appointment Date</label>
                <input type="datetime-local" th:field="*{appointmentDate}" required/>
                <input th:each="doc : ${doctors}" type="hidden" name="doc.id" th:value="${doc.id}"/>


                <button type="submit">Submit</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
