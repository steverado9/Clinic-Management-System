<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>My reports</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
    <div class="container-fluid">
        <h3 class="navbar-brand">Clinic Management System</h3>
        <h3 class="navbar-brand">My Reports</h3>
        <ul class="d-flex list-unstyled" role="search">
            <li class="me-4"><a class="text-white text-decoration-none" th:href="@{/patient/dashboard}">Dashboard</a></li>
            <li class=""><a class="text-white text-decoration-none" th:href="@{/logout}">Logout</a></li>
        </ul>
    </div>
</nav>
<br>
<br>

<div class="container">
    <p th:if="${#lists.isEmpty(reports)}" style="color:gray;">
        No medical reports yet.
    </p>
    <div th:if="${error}">
        <p th:text="${error}"></p>
    </div>
    <table class="table">
        <thead>
            <tr>
                <th scope="col">Date</th>
                <th scope="col">Doctor</th>
                <th scope="col">Clinic</th>
                <th scope="col">Diagnosis</th>
                <th scope="col">Treatment</th>
            </tr>
        </thead>
        <tbody>
        <tr th:each="report : ${reports}">
            <td th:text="${#temporals.format(report.createdAt, 'MMM dd, yyyy hh:mm a')}"></td>
            <td th:text="${report.doctor.fullName}"></td>
            <td th:text="${report.clinicName}"></td>
            <td th:text="${report.diagnosis}"></td>
            <td th:text="${report.treatmentNotes}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
