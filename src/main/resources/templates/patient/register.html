<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Register Here</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
    <div class="container-fluid">
        <h2 class="navbar-brand">Clinic Management System</h2>
        <h2 class="navbar-brand">Patient Registration Form</h2>
        <ul class="d-flex list-unstyled" role="search">
            <li class="me-4"><a class="text-white text-decoration-none" th:href="@{/login}">Login</a></li>
            <li class=""><a class="text-white text-decoration-none" th:href="@{/logout}">Logout</a></li>
        </ul>
    </div>
</nav>
<div class="container">
    <div class="row">
        <div class="col-lg-6 col-sm-6 container justify-content-center card mt-5">
            <h1 class="text-center">Registration Form</h1>
            <div class="card-body">
                <form class="row g-3 needs-validation" th:action="@{/patient/register}" method="post" novalidate>
                    <input type="hidden" name="token" th:value="${token}" />

                    <div class="col-md-6">
                        <input type="text" name="fullName" class="form-control"  placeholder="Full Name" id="fullname" required />
                        <div class="invalid-feedback">
                            Please provide a name.
                        </div>
                    </div>

                    <div class="col-md-6">
                        <input type="password" name="password" class="form-control"  placeholder="Password" required />
                        <div class="invalid-feedback">
                            Please provide a password.
                        </div>
                    </div>

                    <div class="col-md-6">
                        <input type="text" name="phoneNumber" class="form-control"  placeholder="Phone number" required />
                        <div class="invalid-feedback">
                            Please provide a Phone number.
                        </div>
                    </div>




                    <button class="btn btn-primary" type="submit">Register</button>
                </form>


                <div th:if="${error}">
                    <p th:text="${error}"></p>
                </div>
            </div>
        </div>
    </div>
</div>


<script>
    (() => {
      'use strict'

      // Fetch all the forms we want to apply custom Bootstrap validation styles to
      const forms = document.querySelectorAll('.needs-validation')

      // Loop over them and prevent submission
      Array.from(forms).forEach(form => {
        form.addEventListener('submit', event => {
        console.log(">>>", form);
          if (!form.checkValidity()) {
            event.preventDefault()
            event.stopPropagation()
          }

          form.classList.add('was-validated')
        }, false)
      })
    })()
</script>

</body>
</html>
