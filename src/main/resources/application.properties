spring.application.name=Clinic-management-system
spring.datasource.url=jdbc:mysql://localhost:3306/cms?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&useLegacyDatetimeCode=false
spring.datasource.username=root
spring.datasource.password=12345

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=create

#logging to see hibernate intended queries
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

#catch errors
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false